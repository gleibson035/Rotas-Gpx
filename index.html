<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Rotas GPX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height: 90vh; }
#bar {
  height: 10vh;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}
button {
  padding:10px 15px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="bar">
  <button onclick="clearRoute()">Limpar</button>
  <button onclick="downloadGPX()">Baixar GPX</button>
</div>

<script>

const map = L.map('map').setView([38.7223, -9.1393], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OSM'
}).addTo(map);

let points = [];
let line;

map.on('click', function(e){
  points.push(e.latlng);
  L.marker(e.latlng).addTo(map);

  if(line) map.removeLayer(line);

  line = L.polyline(points, {color:'blue'}).addTo(map);
});

function clearRoute(){
  location.reload();
}

function downloadGPX(){

  if(points.length === 0){
    alert("Sem rota!");
    return;
  }

  let gpx = `<?xml version="1.0"?>
<gpx version="1.1">
<trk><name>Rota</name><trkseg>`;

  points.forEach(p=>{
    gpx += `<trkpt lat="${p.lat}" lon="${p.lng}"></trkpt>`;
  });

  gpx += `</trkseg></trk></gpx>`;

  const blob = new Blob([gpx], {type:'application/gpx+xml'});
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = "rota.gpx";
  a.click();
}

</script>

</body>
</html>
